{% extends "web/base.html" %}
{% block title %}Add Levy Rate{% endblock %}
{% block page_title %}Add Levy Rate{% endblock %}
{% block content %}
<div class="form-card" style="max-width:640px">
  <form method="post">
    {% csrf_token %}
    <div class="form-grid form-grid-2" style="gap:16px">
      <div class="form-section-title">Rate Details</div>
      <div class="form-group full">
        <label>Rate Name *</label>
        <input class="form-control" name="name" required placeholder="e.g. 2 Bedroom Apartment">
      </div>
      <div class="form-group">
        <label>Monthly Amount (R) *</label>
        <input class="form-control" name="amount" type="number" step="0.01" required placeholder="1500.00">
      </div>
      <div class="form-group">
        <label>Effective From *</label>
        <input class="form-control" name="effective_from" type="date" required value="{% now 'Y-m-d' %}">
      </div>

      <div class="form-section-title">Applies To</div>
      <div class="form-group">
        <label>Unit Type <span style="color:var(--text-muted);font-weight:400">(blank = all)</span></label>
        <select class="form-control" name="unit_type">
          <option value="">All Unit Types</option>
          <option value="apartment">Apartment</option>
          <option value="house">House</option>
          <option value="townhouse">Townhouse</option>
          <option value="penthouse">Penthouse</option>
          <option value="studio">Studio</option>
          <option value="commercial">Commercial</option>
        </select>
      </div>
      <div class="form-group">
        <label>Bedrooms <span style="color:var(--text-muted);font-weight:400">(blank = any)</span></label>
        <input class="form-control" name="bedrooms" type="number" min="0" placeholder="e.g. 2">
      </div>
      <div class="form-group">
        <label>Min Size (m²) <span style="color:var(--text-muted);font-weight:400">(optional)</span></label>
        <input class="form-control" name="min_size_sqm" type="number" step="0.01" placeholder="e.g. 50">
      </div>
      <div class="form-group">
        <label>Max Size (m²) <span style="color:var(--text-muted);font-weight:400">(optional)</span></label>
        <input class="form-control" name="max_size_sqm" type="number" step="0.01" placeholder="e.g. 120">
      </div>
      <div class="form-actions">
        <a href="{% url 'web:levy_rates' %}" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary">Add Rate</button>
      </div>
    </div>
  </form>
</div>
{% endblock %}
