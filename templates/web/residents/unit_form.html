{% extends "web/base.html" %}
{% block title %}Add Unit{% endblock %}
{% block page_title %}Add Unit{% endblock %}
{% block content %}
<div class="form-card" style="max-width:600px">
  <form method="post">
    {% csrf_token %}
    <div class="form-grid form-grid-2">
      <div class="form-section-title">Unit Details</div>
      <div class="form-group">
        <label>Unit Number *</label>
        <input class="form-control" name="unit_number" placeholder="e.g. A101" required>
      </div>
      <div class="form-group">
        <label>Unit Type *</label>
        <select class="form-control" name="unit_type">
          <option value="apartment">Apartment</option>
          <option value="house">House</option>
          <option value="townhouse">Townhouse</option>
          <option value="penthouse">Penthouse</option>
          <option value="studio">Studio</option>
          <option value="commercial">Commercial</option>
        </select>
      </div>
      <div class="form-group">
        <label>Bedrooms</label>
        <input class="form-control" name="bedrooms" type="number" min="0" value="1">
      </div>
      <div class="form-group">
        <label>Bathrooms</label>
        <input class="form-control" name="bathrooms" type="number" min="0" value="1">
      </div>
      <div class="form-group">
        <label>Floor Size (m²)</label>
        <input class="form-control" name="floor_size_sqm" type="number" step="0.01" placeholder="Optional">
      </div>
      <div class="form-group">
        <label>Notes</label>
        <input class="form-control" name="notes" placeholder="Optional">
      </div>
      <div class="form-actions">
        <a href="{% url 'web:units' %}" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary">Add Unit</button>
      </div>
    </div>
  </form>
</div>
{% endblock %}
